<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/pdf.css">
  <link rel="icon" href="assets/Images/snowflake1.jpg">
</head>

<body>

  <div class="container">

    <header>
      <img src="assets/Images/settingwhite.png" alt="CONFIGURAÇÕES">
    </header>

    <div class="card">


      <div class="logo">
        <div class="logo-icon"><img src="assets/Images/Ar.png" alt="Logo BTU"></div><!--logo icon-->
        <h1>BTU<span>Calculator</span></h1>
      </div><!--logo-->

      <div class="name"><!-- NOME DO AMBIENTE -->
        <h3>Nome do ambiente:</h3>
        <input type="text" id="nomeAmbiente" placeholder="Ex: Sala, Quarto, Cozinha">
      </div>

      <!-- INPUTS -->
      <div class="grid">
        <input type="number" id="largura" placeholder="Largura (m)">
        <input type="number" id="comprimento" placeholder="Comprimento (m)">
        <input type="number" id="pessoas" placeholder="Quantidade de pessoas">
        <input type="number" id="eletronicos" placeholder="Eletrônicos">
        <input type="number" id="portas" placeholder="Portas externas">
        <input type="number" id="janelas" placeholder="Janelas">
        <input type="number" id="paredes" placeholder="Paredes no sol">
      </div>

      <!-- CONFIGURAÇÕES -->
      <div class="section">
        <label>Tamanho das janelas</label>
        <select id="janela">
          <option value="">Selecione</option>
          <option value="1">Pequena</option>
          <option value="2">Média</option>
          <option value="3">Grande</option>
        </select>
      </div>

      <div class="section">
        <label>Incidência solar</label>
        <select id="sol">
          <option value="">Selecione</option>
          <option value="1">Sol o dia todo</option>
          <option value="2">Meio período</option>
          <option value="0">Sem sol</option>
        </select>
      </div>

      <div class="section">
        <label>Teto possui forro?</label>
        <select id="forro">
          <option value="">Selecione</option>
          <option value="1">Não</option>
          <option value="0">Sim</option>
        </select>
      </div>

      <!-- BOTÃO -->
      <button id="btnCalcular" type="button" onclick="acaoBotao()">Calcular</button>

    </div><!--card-->

    <div class="card">

      <!-- RESULTADO -->
      <div class="resultado-box">

        <h2>Resultado</h2>

        <p><strong>Carga térmica:</strong></p>
        <div id="resultado" class="resultado"></div>

        <div class="recomendacao-box">
          <h3>Recomendação:</h3>
          <div id="recomendacao"></div>
        </div>
        <div id="pdfResultado"></div>

        <div class="distribuicao-box" id="boxDistribuicao" style="display: none;">
          <h3>Distribuição de ar:</h3>
          <div id="distribuicao"></div>
          <div id="pdfDistribuicao"></div>
        </div>
      </div>

      <!-- HISTÓRICO -->
      <div id="historico" class="historico-box">
        <h2>Histórico</h2>
      </div>

    </div>

  </div>

  <div class="pdf" style="position: absolute; left: -99999px; top: 0; visibility: hidden;">
    <div id="pdfArea">
      <div class="pdf-page">

        <div class="pdf-header">
        </div>

        <div class="pdf-info">
        </div>

        <div class="pdf-btu-card">
        </div>

        <div class="pdf-resumo">
        </div>

      </div>
    </div>
  </div>


  <!-- OVERLAY -->
  <div class="modal-overlay" id="modalOverlay">

    <!-- MODAL -->
    <div class="modal-pdf">

      <button class="fechar-modal" id="fecharModal">
        ✕
      </button>

      <h2>Gerar PDF</h2>

      <p class="subtitulo-modal">
        Preencha os dados abaixo para gerar o PDF.
      </p>

      <!-- CLIENTE -->
      <div class="campo-modal">

        <label>
          Nome do cliente:
        </label>

        <input type="text" id="nomeCliente" placeholder="Digite o nome do cliente" maxlength="40">
        <small id="contadorNome">Contador de Letras: 0/40</small>

      </div>

      <div class="modal-overlay" id="modalAviso">

        <div class="modal-aviso">

          <h2 id="tituloAviso">Atenção!</h2>

          <p id="mensagemAviso"></p>

          <button id="btnFecharAviso">
            OK
          </button>

        </div>

      </div>

      <!-- DISTRIBUIÇÕES -->
      <div class="campo-modal" id="campoDistribuicao">

        <label>
          Escolha uma distribuição:
        </label>

        <select id="tipoDistribuicao">

          <option value="">
            Escolha uma distribuição:
          </option>

          <option value="aberto">
            Espaço aberto
          </option>

          <option value="medio">
            Média dificuldade de circulação
          </option>

          <option value="dificil">
            Grande dificuldade de circulação
          </option>

        </select>

      </div>

      <!-- BOTÃO -->
      <button type="button" class="btn-gerar" id="btnConfirmarPDF">
        Gerar PDF
      </button>

    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.min.js"></script>

  <script src="assets/js/pdf.js"></script>

  <script src="assets/js/script.js"></script>

</body>

</html>
